experiment:
  name: libero_query_memory_baseline
  output_dir: ../outputs/prismvla/libero_query_memory_baseline
  seed: 7

model:
  architecture_config: configs/model/qwen35_query_memory.yaml

data:
  spec: experiments.libero.data:LIBERO_DATA_SPEC
  root: ../benchmarks/libero/lerobot-v2.1-rotate180
  anchor_stride: 1
  include_tail: true
  datasets:
    - name: libero_spatial
      path: libero_spatial
      weight: 1.0
    - name: libero_object
      path: libero_object
      weight: 1.0
    - name: libero_goal
      path: libero_goal
      weight: 1.0
    - name: libero_10
      path: libero_10
      weight: 1.0
  normalization:
    group: libero
    statistics_path: ../benchmarks/libero/lerobot-v2.1-rotate180/statistics.json
  loader:
    global_samples_per_epoch: 32768
    batch_size_per_rank: 1
    num_workers: 4
    preprocessing_workers: 1
    pin_memory: true
    persistent_workers: false
    drop_last: true

optimization:
  optimizer: adamw
  beta1: 0.9
  beta2: 0.95
  epsilon: 1.0e-8
  no_decay_rule: bias_and_low_dimensional
  language_model:
    trainable: false
    learning_rate: null
    weight_decay: null
  vision_encoder:
    trainable: false
    learning_rate: null
    weight_decay: null
  action_queries:
    trainable: true
    learning_rate: 1.0e-4
    weight_decay: 0.0
  history_qformer:
    trainable: true
    learning_rate: 1.0e-4
    weight_decay: 0.01
  action_head:
    trainable: true
    learning_rate: 1.0e-4
    weight_decay: 0.01

trainer:
  max_steps: 100000
  gradient_accumulation_steps: 8
  mixed_precision: bf16
  scheduler: linear_warmup_decay
  warmup_steps: 5000
  max_grad_norm: 1.0
  log_interval: 10
  save_interval: 5000
