benchmark: libero
run_name: libero_10_stage1_direct_progress_w4_episode_feature_ep5000
seed: 42
deterministic: false

bridge_prism_config: configs/model/prism_base.yaml
load_vlm: false

dataset_type: memory_token_cache
dataset_config_path: local_data/token_caches/libero_10_episode_feature_internvl3_hidden_l3_6_9_12_stride16/manifest.json
dataset_config_base_dir: .
cache_dir: local_data/cache/prism/libero/stage1/libero_10

save_dir: local_data/runs/libero/stage1/libero_10_direct_progress_w4_episode_feature_ep5000
disable_wandb: true
disable_swanlab: true

horizon: 32
per_action_dim: 7
state_dim: 8
memory_entry_tokens: 16
num_layers: 8
action_head_ffn_dim: 3584
num_plan_slots: 8
short_memory_time_bins: 4
max_vlm_tokens:

memory_token_cache_sequence_training: true
# Current Stage1 uses episode-level fixed-replan-node training:
# each DataLoader item is one episode, progress state is advanced through
# all episode nodes in order, and FM loss is computed on full-horizon nodes.
# The legacy burn-in/loss-window knobs remain in the schema defaults only;
# this episode feature cache path does not sample fixed-size trajectory windows.
shuffle_trajectory_windows: false

finetune_vlm: false
finetune_action_head: true
finetune_progress_planner: false

enable_bridge_aux_loss: false

max_steps: 5000
warmup_steps: 500
batch_size: 1
num_workers: 0
log_interval: 10
ckpt_interval: 1000000
best_ckpt_interval: 1
best_ckpt_min_step: 1

lr: 5.0e-5
min_lr_ratio: 0.1
weight_decay: 1.0e-3
grad_clip_norm: 1.0
dropout: 0.1
min_cuda_memory_gb: 22.0

num_inference_timesteps: 15
inference_tau_schedule: midpoint
avoid_endpoint_tau: true

lr_groups:
  flow_matching_action_head: 5.0e-5
  action_expert: 5.0e-5
  flow_time_embedding: 1.0e-4
  timestep_mlp: 1.0e-4
  noisy_action_encoder: 1.0e-4
  bridge_attention: 1.0e-4
  bridge_adapter: 1.0e-4
  short_memory_encoder: 1.0e-4
  short_memory_projector: 1.0e-4
  plan_projector: 1.0e-4
  progress_condition_projector: 1.0e-4
  source_mlp: 1.0e-4
  gates: 5.0e-5
  action_pos_embedding: 5.0e-5
  temporal_pos_embedding: 5.0e-5
