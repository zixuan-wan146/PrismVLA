backbone:
  model_name: Qwen/Qwen3.5-0.8B
  num_hidden_layers: 16
  hidden_size: 1024
  num_action_queries: 32
  image_size: 256
  torch_dtype: bfloat16
  local_files_only: false

history:
  input_dim: 1024
  hidden_size: 512
  num_layers: 2
  num_heads: 4
  mlp_ratio: 4
  num_memory_tokens: 16
  num_history_frames: 2
  max_relative_age: 8
  dropout: 0.0

temporal:
  action_horizon: 8
  replan_stride: 8
  history_capture_offsets: [2, 5]

action_head:
  objective: direct_masked_l1
  action_dim: 7
  gripper_index: 6
  gripper_threshold: 0.5
  # Provisional runnable capacity; benchmark evidence must decide later revisions.
  action_hidden_size: 512
  num_attention_heads: 8
  ffn_ratio: 4

bridge:
  num_layers: 16
  memory_gate_init: 0.1

task_state_planner:
  query_layer: 12
  query_input_dim: 1024
  num_query_tokens: 32
  hidden_size: 512
  num_state_tokens: 8
  num_plan_tokens: 16
  action_dim: 7
  action_horizon: 8
  action_mlp_hidden_size: 256
  mlp_hidden_size: 1024
  num_attention_heads: 8
  attention_dropout: 0.0
  mlp_dropout: 0.0
  plan_horizon_actions: 64
  mamba_num_layers: 1
  mamba_d_state: 16
  mamba_d_conv: 4
  mamba_expand: 2
