name: remote-contract-tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: prismvla-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-ddp:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install project test environment
        run: python -m pip install --upgrade pip && python -m pip install -e ".[data,dev]"
      - name: Lint
        run: ruff check prism scripts experiments tests
      - name: Unit and real CPU DDP tests
        run: pytest -q
